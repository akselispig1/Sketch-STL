<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SketchCAD">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b0e14'/%3E%3Cpath d='M32 9l19 11v24L32 55 13 44V20z' fill='none' stroke='%235aa9ff' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M32 9v46M13 20l19 11 19-11' fill='none' stroke='%235aa9ff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E">
<title>SketchCAD — drawing to STL</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:#0b0e14;color:#e6edf7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px}
#app{max-width:760px;margin:0 auto;padding:0 12px calc(env(safe-area-inset-bottom) + 86px)}
header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 12px) 4px 12px;background:linear-gradient(#0b0e14,#0b0e14f2)}
header h1{font-size:18px;margin:0;font-weight:700}
header .sub{color:#5aa9ff;font-size:13px;flex:1}
.icon{background:#1a2130;border:0;color:#e6edf7;border-radius:8px;padding:7px 11px;font-size:16px;cursor:pointer}
.card{background:#121723;border:1px solid #1d2636;border-radius:14px;padding:14px;margin:10px 0}
.fld{display:flex;flex-direction:column;gap:6px;font-size:12px;color:#8c98ad;margin-bottom:10px}
.fld:last-child{margin-bottom:0}
.fld input,.fld select{background:#0b0e14;border:1px solid #26304a;color:#e6edf7;border-radius:9px;padding:11px;font-size:15px}
.note{font-size:11.5px;color:#8c98ad;line-height:1.55;margin:6px 0 0}
.chk{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#cfd8e6;margin-top:2px}
.chk input{width:18px;height:18px;flex:none}
.chk span{color:#8c98ad}
.btn{border:0;border-radius:10px;padding:12px 14px;font-size:15px;font-weight:600;background:#1a2130;color:#e6edf7;cursor:pointer;width:100%}
.btn.primary{background:#5aa9ff;color:#06101f}
.btn:disabled{opacity:.45;cursor:default}
#thumb{display:block;width:100%;max-height:230px;object-fit:contain;border-radius:10px;margin-top:10px;background:#fff}
#startRow{margin-top:10px}
.chat{display:flex;flex-direction:column;gap:8px;margin:6px 0}
.bubble{padding:10px 12px;border-radius:13px;font-size:14.5px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word;max-width:92%}
.bubble.user{align-self:flex-end;background:#15324f;color:#cfe6ff;border-bottom-right-radius:4px}
.bubble.ai{align-self:flex-start;background:#161d2b;border:1px solid #26304a;border-bottom-left-radius:4px}
.bubble.error{align-self:stretch;background:#3a1620;border:1px solid #5e2230;color:#ffb3c0;font-size:13px;max-width:100%}
.bubble.system-note{align-self:center;background:transparent;color:#5f6c82;font-size:12px}
.composer{position:fixed;left:0;right:0;bottom:0;z-index:6;display:flex;gap:8px;padding:10px 12px calc(env(safe-area-inset-bottom) + 10px);background:#0d1119;border-top:1px solid #1d2636}
.composer .inner{max-width:760px;margin:0 auto;display:flex;gap:8px;width:100%}
.composer input{flex:1;background:#0b0e14;border:1px solid #26304a;color:#e6edf7;border-radius:10px;padding:12px;font-size:15px}
.composer .btn{width:auto;padding:12px 18px}
.status{position:fixed;left:0;right:0;bottom:70px;z-index:6;text-align:center;font-size:12px;color:#5aa9ff;pointer-events:none}
.preview #stage{position:relative;height:42vh;min-height:240px;background:radial-gradient(120% 90% at 50% 0%,#16203a,#0b0e14 65%);border-radius:10px;overflow:hidden}
.preview canvas{width:100%;height:100%;display:block;touch-action:none}
.previewbar{display:flex;align-items:center;gap:10px;margin-top:10px}
.previewbar .muted{flex:1;color:#8c98ad;font-size:12px}
.previewbar .btn{width:auto;padding:12px 18px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>SketchCAD</h1><span class="sub">drawing → STL</span>
    <button id="settingsBtn" class="icon" aria-label="settings">⚙</button>
  </header>

  <section id="setup" class="card">
    <label class="fld">Anthropic API key
      <input id="key" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    </label>
    <label class="fld">AI model
      <select id="model">
        <option value="claude-sonnet-4-6">Sonnet 4.6 — faster, cheaper</option>
        <option value="claude-opus-4-8">Opus 4.8 — best for messy drawings</option>
      </select>
    </label>
    <label class="chk"><input id="autocheck" type="checkbox" checked> Auto-check placement with the AI <span>(more accurate; uses a little more)</span></label>
    <p class="note">Your key is stored only on this device and sent straight to Anthropic. Get one at <b>console.anthropic.com</b>. The AI step needs internet, and this page must be served over <b>https</b> (not opened as a local file).</p>
  </section>

  <section class="card">
    <input id="photo" type="file" accept="image/*" hidden>
    <button id="photoBtn" class="btn">📷 Add photo of your drawing</button>
    <img id="thumb" alt="your drawing">
    <div id="startRow"><button id="start" class="btn primary">Interpret drawing →</button></div>
  </section>

  <section id="chat" class="chat"></section>

  <section class="card preview">
    <div id="stage"><canvas id="view"></canvas></div>
    <div class="previewbar">
      <span id="stats" class="muted">No model yet</span>
      <button id="dl" class="btn primary" disabled>Save STL</button>
    </div>
  </section>
</div>

<div id="status" class="status"></div>
<div class="composer"><div class="inner">
  <input id="msg" type="text" placeholder="Answer the AI, or ask for changes…">
  <button id="send" class="btn">Send</button>
</div></div>

<script>/*
 * SketchCAD engine — turns a structured geometry spec (the AI's output) into a
 * watertight triangle mesh + binary STL. Pure JS: runs in the browser AND in node
 * (so we can test it headlessly). Constructive Solid Geometry based on csg.js
 * (Evan Wallace, MIT) for real boolean ops (holes, cuts, unions).
 */
(function (global) {
  "use strict";

  // ---------- csg.js core (MIT, Evan Wallace) ----------
  function CSG() { this.polygons = []; }
  CSG.fromPolygons = function (polygons) { var c = new CSG(); c.polygons = polygons; return c; };
  CSG.prototype = {
    clone: function () { var c = new CSG(); c.polygons = this.polygons.map(function (p) { return p.clone(); }); return c; },
    toPolygons: function () { return this.polygons; },
    union: function (csg) {
      var a = new Node(this.clone().polygons), b = new Node(csg.clone().polygons);
      a.clipTo(b); b.clipTo(a); b.invert(); b.clipTo(a); b.invert();
      a.build(b.allPolygons()); return CSG.fromPolygons(a.allPolygons());
    },
    subtract: function (csg) {
      var a = new Node(this.clone().polygons), b = new Node(csg.clone().polygons);
      a.invert(); a.clipTo(b); b.clipTo(a); b.invert(); b.clipTo(a); b.invert();
      a.build(b.allPolygons()); a.invert(); return CSG.fromPolygons(a.allPolygons());
    },
    intersect: function (csg) {
      var a = new Node(this.clone().polygons), b = new Node(csg.clone().polygons);
      a.invert(); b.clipTo(a); b.invert(); a.clipTo(b); b.clipTo(a);
      a.build(b.allPolygons()); a.invert(); return CSG.fromPolygons(a.allPolygons());
    }
  };

  function Vector(x, y, z) { this.x = x; this.y = y; this.z = z; }
  Vector.prototype = {
    clone: function () { return new Vector(this.x, this.y, this.z); },
    negated: function () { return new Vector(-this.x, -this.y, -this.z); },
    plus: function (a) { return new Vector(this.x + a.x, this.y + a.y, this.z + a.z); },
    minus: function (a) { return new Vector(this.x - a.x, this.y - a.y, this.z - a.z); },
    times: function (a) { return new Vector(this.x * a, this.y * a, this.z * a); },
    dividedBy: function (a) { return new Vector(this.x / a, this.y / a, this.z / a); },
    dot: function (a) { return this.x * a.x + this.y * a.y + this.z * a.z; },
    lerp: function (a, t) { return this.plus(a.minus(this).times(t)); },
    length: function () { return Math.sqrt(this.dot(this)); },
    unit: function () { var l = this.length(); return l ? this.dividedBy(l) : new Vector(0, 0, 0); },
    cross: function (a) { return new Vector(this.y * a.z - this.z * a.y, this.z * a.x - this.x * a.z, this.x * a.y - this.y * a.x); }
  };

  function Vertex(pos, normal) { this.pos = pos.clone(); this.normal = normal ? normal.clone() : new Vector(0, 0, 0); }
  Vertex.prototype = {
    clone: function () { return new Vertex(this.pos, this.normal); },
    flip: function () { this.normal = this.normal.negated(); },
    interpolate: function (o, t) { return new Vertex(this.pos.lerp(o.pos, t), this.normal.lerp(o.normal, t)); }
  };

  function Plane(normal, w) { this.normal = normal; this.w = w; }
  Plane.EPSILON = 1e-5;
  Plane.fromPoints = function (a, b, c) { var n = b.minus(a).cross(c.minus(a)).unit(); return new Plane(n, n.dot(a)); };
  Plane.prototype = {
    clone: function () { return new Plane(this.normal.clone(), this.w); },
    flip: function () { this.normal = this.normal.negated(); this.w = -this.w; },
    splitPolygon: function (polygon, coplanarFront, coplanarBack, front, back) {
      var COPLANAR = 0, FRONT = 1, BACK = 2, SPANNING = 3;
      var polygonType = 0, types = [], i, t, type;
      for (i = 0; i < polygon.vertices.length; i++) {
        t = this.normal.dot(polygon.vertices[i].pos) - this.w;
        type = (t < -Plane.EPSILON) ? BACK : (t > Plane.EPSILON) ? FRONT : COPLANAR;
        polygonType |= type; types.push(type);
      }
      switch (polygonType) {
        case COPLANAR:
          (this.normal.dot(polygon.plane.normal) > 0 ? coplanarFront : coplanarBack).push(polygon); break;
        case FRONT: front.push(polygon); break;
        case BACK: back.push(polygon); break;
        case SPANNING:
          var f = [], b = [];
          for (i = 0; i < polygon.vertices.length; i++) {
            var j = (i + 1) % polygon.vertices.length;
            var ti = types[i], tj = types[j], vi = polygon.vertices[i], vj = polygon.vertices[j];
            if (ti !== BACK) f.push(vi);
            if (ti !== FRONT) b.push(ti !== BACK ? vi.clone() : vi);
            if ((ti | tj) === SPANNING) {
              var tt = (this.w - this.normal.dot(vi.pos)) / this.normal.dot(vj.pos.minus(vi.pos));
              var v = vi.interpolate(vj, tt); f.push(v); b.push(v.clone());
            }
          }
          if (f.length >= 3) front.push(new Polygon(f, polygon.shared));
          if (b.length >= 3) back.push(new Polygon(b, polygon.shared));
          break;
      }
    }
  };

  function Polygon(vertices, shared) {
    this.vertices = vertices; this.shared = shared;
    this.plane = Plane.fromPoints(vertices[0].pos, vertices[1].pos, vertices[2].pos);
  }
  Polygon.prototype = {
    clone: function () { return new Polygon(this.vertices.map(function (v) { return v.clone(); }), this.shared); },
    flip: function () { this.vertices.reverse().forEach(function (v) { v.flip(); }); this.plane.flip(); }
  };

  function Node(polygons) { this.plane = null; this.front = null; this.back = null; this.polygons = []; if (polygons) this.build(polygons); }
  Node.prototype = {
    clone: function () { var n = new Node(); n.plane = this.plane && this.plane.clone(); n.front = this.front && this.front.clone(); n.back = this.back && this.back.clone(); n.polygons = this.polygons.map(function (p) { return p.clone(); }); return n; },
    invert: function () { for (var i = 0; i < this.polygons.length; i++) this.polygons[i].flip(); this.plane.flip(); if (this.front) this.front.invert(); if (this.back) this.back.invert(); var t = this.front; this.front = this.back; this.back = t; },
    clipPolygons: function (polygons) {
      if (!this.plane) return polygons.slice();
      var front = [], back = [], i;
      for (i = 0; i < polygons.length; i++) this.plane.splitPolygon(polygons[i], front, back, front, back);
      if (this.front) front = this.front.clipPolygons(front);
      if (this.back) back = this.back.clipPolygons(back); else back = [];
      return front.concat(back);
    },
    clipTo: function (node) { this.polygons = node.clipPolygons(this.polygons); if (this.front) this.front.clipTo(node); if (this.back) this.back.clipTo(node); },
    allPolygons: function () { var p = this.polygons.slice(); if (this.front) p = p.concat(this.front.allPolygons()); if (this.back) p = p.concat(this.back.allPolygons()); return p; },
    build: function (polygons) {
      if (!polygons.length) return;
      if (!this.plane) this.plane = polygons[0].plane.clone();
      var front = [], back = [], i;
      for (i = 0; i < polygons.length; i++) this.plane.splitPolygon(polygons[i], this.polygons, this.polygons, front, back);
      if (front.length) { if (!this.front) this.front = new Node(); this.front.build(front); }
      if (back.length) { if (!this.back) this.back = new Node(); this.back.build(back); }
    }
  };

  // ---------- primitives (all centred on origin; Z is "up") ----------
  function cube(sx, sy, sz) {
    var r = [sx / 2, sy / 2, sz / 2];
    var faces = [[[0, 4, 6, 2], [-1, 0, 0]], [[1, 3, 7, 5], [1, 0, 0]], [[0, 1, 5, 4], [0, -1, 0]],
                 [[2, 6, 7, 3], [0, 1, 0]], [[0, 2, 3, 1], [0, 0, -1]], [[4, 5, 7, 6], [0, 0, 1]]];
    return CSG.fromPolygons(faces.map(function (info) {
      var n = info[1];
      return new Polygon(info[0].map(function (i) {
        var pos = new Vector(r[0] * (2 * (i & 1 ? 1 : 0) - 1), r[1] * (2 * (i & 2 ? 1 : 0) - 1), r[2] * (2 * (i & 4 ? 1 : 0) - 1));
        return new Vertex(pos, new Vector(n[0], n[1], n[2]));
      }));
    }));
  }
  function cylinder(r, h, slices) {
    slices = slices || 48; var z0 = -h / 2, z1 = h / 2, polys = [], i;
    var c0 = new Vector(0, 0, z0), c1 = new Vector(0, 0, z1);
    function side(a) { return new Vector(Math.cos(a) * r, Math.sin(a) * r, 0); }
    for (i = 0; i < slices; i++) {
      var a0 = 2 * Math.PI * i / slices, a1 = 2 * Math.PI * (i + 1) / slices;
      var s0 = side(a0), s1 = side(a1);
      polys.push(new Polygon([
        new Vertex(new Vector(s0.x, s0.y, z0)), new Vertex(new Vector(s1.x, s1.y, z0)),
        new Vertex(new Vector(s1.x, s1.y, z1)), new Vertex(new Vector(s0.x, s0.y, z1))]));
      polys.push(new Polygon([new Vertex(c0, new Vector(0, 0, -1)),
        new Vertex(new Vector(s1.x, s1.y, z0), new Vector(0, 0, -1)), new Vertex(new Vector(s0.x, s0.y, z0), new Vector(0, 0, -1))]));
      polys.push(new Polygon([new Vertex(c1, new Vector(0, 0, 1)),
        new Vertex(new Vector(s0.x, s0.y, z1), new Vector(0, 0, 1)), new Vertex(new Vector(s1.x, s1.y, z1), new Vector(0, 0, 1))]));
    }
    return CSG.fromPolygons(polys);
  }
  function cone(r0, r1, h, slices) {
    slices = slices || 48; var z0 = -h / 2, z1 = h / 2, polys = [], i;
    function rim(a, r, z) { return new Vector(Math.cos(a) * r, Math.sin(a) * r, z); }
    for (i = 0; i < slices; i++) {
      var a0 = 2 * Math.PI * i / slices, a1 = 2 * Math.PI * (i + 1) / slices, am = (a0 + a1) / 2;
      if (r0 > 1e-9 && r1 > 1e-9) {
        polys.push(new Polygon([new Vertex(rim(a0, r0, z0)), new Vertex(rim(a1, r0, z0)), new Vertex(rim(a1, r1, z1)), new Vertex(rim(a0, r1, z1))]));
      } else if (r1 <= 1e-9) {
        polys.push(new Polygon([new Vertex(rim(a0, r0, z0)), new Vertex(rim(a1, r0, z0)), new Vertex(rim(am, 0, z1))]));
      } else {
        polys.push(new Polygon([new Vertex(rim(am, 0, z0)), new Vertex(rim(a1, r1, z1)), new Vertex(rim(a0, r1, z1))]));
      }
      if (r0 > 1e-9) polys.push(new Polygon([new Vertex(new Vector(0, 0, z0), new Vector(0, 0, -1)),
        new Vertex(rim(a1, r0, z0), new Vector(0, 0, -1)), new Vertex(rim(a0, r0, z0), new Vector(0, 0, -1))]));
      if (r1 > 1e-9) polys.push(new Polygon([new Vertex(new Vector(0, 0, z1), new Vector(0, 0, 1)),
        new Vertex(rim(a0, r1, z1), new Vector(0, 0, 1)), new Vertex(rim(a1, r1, z1), new Vector(0, 0, 1))]));
    }
    return CSG.fromPolygons(polys);
  }
  function sphere(r, slices, stacks) {
    slices = slices || 24; stacks = stacks || 16; var polys = [], i, j;
    function vtx(theta, phi) { theta *= Math.PI * 2; phi *= Math.PI; var d = new Vector(Math.cos(theta) * Math.sin(phi), Math.cos(phi), Math.sin(theta) * Math.sin(phi)); return new Vertex(d.times(r), d); }
    for (i = 0; i < slices; i++) for (j = 0; j < stacks; j++) {
      var vs = []; vs.push(vtx(i / slices, j / stacks));
      if (j > 0) vs.push(vtx((i + 1) / slices, j / stacks));
      vs.push(vtx((i + 1) / slices, (j + 1) / stacks));
      if (j < stacks - 1) vs.push(vtx(i / slices, (j + 1) / stacks));
      polys.push(new Polygon(vs));
    }
    return CSG.fromPolygons(polys);
  }
  function prism(pts, h) {
    var z0 = -h / 2, z1 = h / 2, polys = [], i, n = pts.length;
    var area = 0; for (i = 0; i < n; i++) { var k = (i + 1) % n; area += pts[i][0] * pts[k][1] - pts[k][0] * pts[i][1]; }
    var P = area > 0 ? pts : pts.slice().reverse();
    for (i = 0; i < n; i++) {
      var j = (i + 1) % n;
      polys.push(new Polygon([
        new Vertex(new Vector(P[i][0], P[i][1], z0)), new Vertex(new Vector(P[j][0], P[j][1], z0)),
        new Vertex(new Vector(P[j][0], P[j][1], z1)), new Vertex(new Vector(P[i][0], P[i][1], z1))]));
    }
    var cx = 0, cy = 0; for (i = 0; i < n; i++) { cx += P[i][0]; cy += P[i][1]; } cx /= n; cy /= n;
    for (i = 0; i < n; i++) {
      var j2 = (i + 1) % n;
      polys.push(new Polygon([new Vertex(new Vector(cx, cy, z0), new Vector(0, 0, -1)),
        new Vertex(new Vector(P[j2][0], P[j2][1], z0), new Vector(0, 0, -1)), new Vertex(new Vector(P[i][0], P[i][1], z0), new Vector(0, 0, -1))]));
      polys.push(new Polygon([new Vertex(new Vector(cx, cy, z1), new Vector(0, 0, 1)),
        new Vertex(new Vector(P[i][0], P[i][1], z1), new Vector(0, 0, 1)), new Vertex(new Vector(P[j2][0], P[j2][1], z1), new Vector(0, 0, 1))]));
    }
    return CSG.fromPolygons(polys);
  }

  // ---------- transforms ----------
  function rotMat(rx, ry, rz) {
    var dx = (rx || 0) * Math.PI / 180, dy = (ry || 0) * Math.PI / 180, dz = (rz || 0) * Math.PI / 180;
    var cx = Math.cos(dx), sx = Math.sin(dx), cy = Math.cos(dy), sy = Math.sin(dy), cz = Math.cos(dz), sz = Math.sin(dz);
    return [cz * cy, cz * sy * sx - sz * cx, cz * sy * cx + sz * sx,
            sz * cy, sz * sy * sx + cz * cx, sz * sy * cx - cz * sx,
            -sy, cy * sx, cy * cx];
  }
  function applyTransform(csg, m, off) {
    function tp(v) { return new Vector(m[0] * v.x + m[1] * v.y + m[2] * v.z + (off ? off[0] : 0), m[3] * v.x + m[4] * v.y + m[5] * v.z + (off ? off[1] : 0), m[6] * v.x + m[7] * v.y + m[8] * v.z + (off ? off[2] : 0)); }
    function tn(v) { return new Vector(m[0] * v.x + m[1] * v.y + m[2] * v.z, m[3] * v.x + m[4] * v.y + m[5] * v.z, m[6] * v.x + m[7] * v.y + m[8] * v.z).unit(); }
    return CSG.fromPolygons(csg.toPolygons().map(function (p) {
      return new Polygon(p.vertices.map(function (v) { return new Vertex(tp(v.pos), tn(v.normal)); }), p.shared);
    }));
  }
  function applyLocal(node, csg) {
    var rot = node.rotate || node.angles;
    if (rot && (rot[0] || rot[1] || rot[2])) csg = applyTransform(csg, rotMat(rot[0], rot[1], rot[2]), null);
    var off = node.center || node.offset;
    if (off && (off[0] || off[1] || off[2])) csg = applyTransform(csg, [1, 0, 0, 0, 1, 0, 0, 0, 1], off);
    return csg;
  }

  // ---------- spec evaluator ----------
  var IDENTITY = [1, 0, 0, 0, 1, 0, 0, 0, 1];
  function evalNode(node) {

    function conv(p) { return { x: p.x, y: p.z, z: -p.y }; }
    R.mesh = tris.map(function (t) { return [conv(t[0]), conv(t[1]), conv(t[2])]; });
    var b = [1e9, 1e9, 1e9, -1e9, -1e9, -1e9];
    R.mesh.forEach(function (t) { t.forEach(function (p) {
      if (p.x < b[0]) b[0] = p.x; if (p.y < b[1]) b[1] = p.y; if (p.z < b[2]) b[2] = p.z;
      if (p.x > b[3]) b[3] = p.x; if (p.y > b[4]) b[4] = p.y; if (p.z > b[5]) b[5] = p.z;
    }); });
    R.c = { x: (b[0] + b[3]) / 2, y: (b[1] + b[4]) / 2, z: (b[2] + b[5]) / 2 };
    var md = Math.max(b[3] - b[0], b[4] - b[1], b[5] - b[2]) || 1;
    R.fit = Math.min(cw(), ch()) * 0.8 / md; R.zoom = 1; R.az = 0.7; R.el = -0.5;
    draw();
  }
  function drawPlaceholder() {
    var dpr = window.devicePixelRatio || 1, w = cw(), h = ch();
    canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#3a465e"; ctx.font = "13px -apple-system,sans-serif"; ctx.textAlign = "center";
    ctx.fillText("Your 3D model will appear here", w / 2, h / 2);
  }
  function draw() {
    if (!R.mesh.length) { drawPlaceholder(); return; }
    var dpr = window.devicePixelRatio || 1, w = cw(), h = ch();
    if (canvas.width !== Math.round(w * dpr)) { canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr); }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); ctx.clearRect(0, 0, w, h);
    var ca = Math.cos(R.az), sa = Math.sin(R.az), ce = Math.cos(R.el), se = Math.sin(R.el);
    var s = R.fit * R.zoom, cx = w / 2, cy = h / 2, c = R.c;
    var L = { x: -0.35, y: 0.6, z: 0.72 }, ll = Math.hypot(L.x, L.y, L.z); L.x /= ll; L.y /= ll; L.z /= ll;
    function tf(v) { var x = v.x - c.x, y = v.y - c.y, z = v.z - c.z; var x1 = x * ca + z * sa, z1 = -x * sa + z * ca; var y2 = y * ce - z1 * se, z2 = y * se + z1 * ce; return { x: x1, y: y2, z: z2 }; }
    var items = [], i;
    for (i = 0; i < R.mesh.length; i++) {
      var t = R.mesh[i], a = tf(t[0]), b = tf(t[1]), d = tf(t[2]);
      var ux = b.x - a.x, uy = b.y - a.y, uz = b.z - a.z, vx = d.x - a.x, vy = d.y - a.y, vz = d.z - a.z;
      var nx = uy * vz - uz * vy, ny = uz * vx - ux * vz, nz = ux * vy - uy * vx, nl = Math.hypot(nx, ny, nz) || 1;
      var sh = Math.abs((nx * L.x + ny * L.y + nz * L.z) / nl);
      items.push({ a: a, b: b, c: d, z: (a.z + b.z + d.z) / 3, sh: sh, nz: nz });
    }
    var anyFront = false;
    for (i = 0; i < items.length; i++) { if (items[i].nz > 0) { anyFront = true; break; } }
    items.sort(function (p, q) { return p.z - q.z; });
    for (i = 0; i < items.length; i++) {
      var it = items[i];
      if (anyFront && it.nz <= 0) continue; // hide back-facing triangles -> clean hollow/concave shapes
      var g = 0.18 + 0.82 * it.sh;
      var col = "rgb(" + Math.round(120 * g + 40) + "," + Math.round(150 * g + 45) + "," + Math.round(190 * g + 50) + ")";
      ctx.beginPath();
      ctx.moveTo(cx + it.a.x * s, cy - it.a.y * s);
      ctx.lineTo(cx + it.b.x * s, cy - it.b.y * s);
      ctx.lineTo(cx + it.c.x * s, cy - it.c.y * s);
      ctx.closePath();
      ctx.fillStyle = col; ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.fill(); ctx.stroke();
    }
  }
  function captureViews() {
    if (!R.mesh.length) return null;
    var saved = { az: R.az, el: R.el, zoom: R.zoom }, views = [[0, 0], [0.7, -0.5]], out = [];
    for (var i = 0; i < views.length; i++) {
      R.az = views[i][0]; R.el = views[i][1]; R.zoom = 1; draw();
      out.push(canvas.toDataURL("image/jpeg", 0.7).split(",")[1]);
    }
    R.az = saved.az; R.el = saved.el; R.zoom = saved.zoom; draw();
    return out;
  }
  function autoCheck() { var c = document.getElementById("autocheck"); return !c || c.checked; }

  var ptrs = {}, lx = 0, ly = 0, pd = 0;
  canvas.addEventListener("pointerdown", function (e) { ptrs[e.pointerId] = { x: e.clientX, y: e.clientY }; lx = e.clientX; ly = e.clientY; canvas.setPointerCapture(e.pointerId); });
  canvas.addEventListener("pointermove", function (e) {
    if (!ptrs[e.pointerId]) return; ptrs[e.pointerId] = { x: e.clientX, y: e.clientY };
    var ids = Object.keys(ptrs);
    if (ids.length >= 2) {
      var p0 = ptrs[ids[0]], p1 = ptrs[ids[1]], dd = Math.hypot(p0.x - p1.x, p0.y - p1.y);
      if (pd > 0) { R.zoom *= dd / pd; R.zoom = Math.max(0.3, Math.min(6, R.zoom)); } pd = dd; draw();
    } else {
      R.az += (e.clientX - lx) * 0.01; R.el += (e.clientY - ly) * 0.01; R.el = Math.max(-1.5, Math.min(1.5, R.el)); lx = e.clientX; ly = e.clientY; draw();
    }
  });
  function pend(e) { delete ptrs[e.pointerId]; if (Object.keys(ptrs).length < 2) pd = 0; }
  canvas.addEventListener("pointerup", pend); canvas.addEventListener("pointercancel", pend);
  canvas.addEventListener("wheel", function (e) { e.preventDefault(); R.zoom *= (e.deltaY < 0 ? 1.1 : 0.9); R.zoom = Math.max(0.3, Math.min(6, R.zoom)); draw(); }, { passive: false });
  window.addEventListener("resize", function () { if (currentTris) buildPreview(currentTris); else drawPlaceholder(); });
  drawPlaceholder();
})();
</script>
</body>
